<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Minecraft: Зомби-гонка на выживание | Шутер + Гонки + Выживание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1a3f2c 0%, #0e2a1c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Minecraft', 'Monaco', monospace;
            padding: 20px;
        }

        .game-container {
            background: #2d2d2d;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 3px solid #8b5a2b;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 4px #5c3e1f, 0 10px 25px black;
            cursor: crosshair;
        }

        .info-panel {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: #1f1a12e6;
            backdrop-filter: blur(4px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid #f5c542;
            font-weight: bold;
            text-shadow: 2px 2px 0 #2c2c2c;
        }

        .stats {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            color: #ffec9f;
            background: #00000077;
            padding: 5px 15px;
            border-radius: 32px;
        }

        .stat {
            background: #2a2418;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 1.2rem;
            letter-spacing: 1px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: inset 0 1px 0 #685e48, 0 2px 5px black;
        }

        .stat span:first-child {
            color: #ffaa33;
        }

        .stat span:last-child {
            color: #f0f0f0;
            font-family: monospace;
            font-size: 1.3rem;
            min-width: 65px;
        }

        .controls {
            display: flex;
            gap: 20px;
            background: #00000099;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #ffdd99;
        }

        button {
            background: #f3b33d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 4px 0 #7a4a1a;
            color: #1e2a0c;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a4a1a;
        }

        @keyframes pulse {
            0% { opacity: 0.7; text-shadow: 0 0 0px red;}
            100% { opacity: 1; text-shadow: 0 0 6px #ff3300;}
        }

        .warning {
            animation: pulse 0.6s infinite alternate;
        }

        @media (max-width: 850px) {
            .stat span:last-child { min-width: 45px; font-size: 1rem; }
            .info-panel { flex-direction: column; align-items: stretch; border-radius: 28px; }
            .controls { justify-content: center; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1100" height="700" style="width:100%; height:auto; max-width:1100px; aspect-ratio:1100/700"></canvas>
        <div class="info-panel">
            <div class="stats">
                <div class="stat"><span>❤️ ЗДОРОВЬЕ</span> <span id="hpValue">100</span></div>
                <div class="stat"><span>💀 УБИТО</span> <span id="killCount">0</span></div>
                <div class="stat"><span>🏁 СКОРОСТЬ</span> <span id="speedValue">0</span> <span style="font-size:0.8rem;">км/ч</span></div>
                <div class="stat"><span>⚡ БУСТ</span> <span id="boostTimer">—</span></div>
            </div>
            <div class="controls">
                🎮 W/A/S/D — газ/тормоз/поворот | 🖱️ МЫШЬ — прицел | 🔫 ЛКМ — стрельба | 🔄 R — рестарт
            </div>
            <button id="restartBtn">🚗 РЕСТАРТ 🧟</button>
        </div>
    </div>
    <div style="text-align: center; margin-top: 12px; font-size: 13px; color: #e3c481; font-weight: bold;">
        ⚡ Собирай ЗОЛОТЫЕ БЛОКИ (контрольные точки) — ускорение + очки!  |  Сбивай зомби выстрелами и тараном!
    </div>
</div>

<script>
    (function() {
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        // оптимизация: отключаем сглаживание для пиксель-арт стиля
        ctx.imageSmoothingEnabled = false;
        
        // ---------- ИГРОВЫЕ ПАРАМЕТРЫ (оптимизированные) ----------
        let gameRunning = true;
        let animationId = null;
        let lastTimestamp = 0;
        
        // Размеры мира (границы для игрока)
        const BOUNDS = {
            xMin: 40, xMax: canvas.width - 40,
            yMin: 40, yMax: canvas.height - 40
        };
        
        // ---------- ИГРОК (машина/карт с физикой гоночной) ----------
        const PLAYER_SIZE = 28;
        let player = {
            x: canvas.width/2,
            y: canvas.height/2,
            angle: 0,        // направление движения (rad)
            velX: 0,
            velY: 0,
            health: 100,
            invincibleTimer: 0,
            boostRemaining: 0,    // секунды ускорения
            baseMaxSpeed: 520,     // пикселей в секунду (базовая)
            currentMaxSpeed: 520,
            acceleration: 900,     // ускорение
            turnSpeed: 3.6,        // базовый поворот (рад/сек)
            frictionGround: 5.0,
            reverseAcc: 500
        };
        
        // Временные флаги управления
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            KeyW: false, KeyS: false, KeyA: false, KeyD: false
        };
        
        let gas = false;      // W / стрелка вверх
        let brake = false;    // S / стрелка вниз
        let turnLeft = false;  // A / лево
        let turnRight = false; // D / право
        
        // Оружие
        let bullets = [];
        let shootCooldown = 0;
        const SHOOT_DELAY = 0.12; // секунды
        const BULLET_SPEED = 950;
        const BULLET_DAMAGE = 34;
        let mouseX = player.x, mouseY = player.y;
        
        // Зомби
        let zombies = [];
        let zombieSpawnTimer = 0;
        let baseSpawnDelay = 1.2;
        let currentSpawnDelay = 1.2;
        let killCounter = 0;
        
        // Бонусы / Контрольные точки (гоночный элемент)
        let checkpoints = [];
        const CHECKPOINT_COUNT = 4;
        let checkpointRespawnTimers = [];
        
        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function updateMaxSpeed() {
            let bonus = (player.boostRemaining > 0) ? 1.45 : 1.0;
            let base = player.baseMaxSpeed;
            player.currentMaxSpeed = base * bonus;
        }
        
        // Нанесение урона игроку
        function damagePlayer(amount) {
            if (!gameRunning) return;
            if (player.invincibleTimer > 0) return;
            player.health = Math.max(0, player.health - amount);
            player.invincibleTimer = 0.65; // секунды неуязвимости
            if (player.health <= 0) {
                gameRunning = false;
                player.health = 0;
            }
            updateUI();
        }
        
        // добавление убийства
        function addKill() {
            killCounter++;
            updateUI();
            // сложность растёт: спавн чаще
            let newDelay = Math.max(0.55, 1.2 - Math.floor(killCounter / 28) * 0.08);
            currentSpawnDelay = Math.min(0.95, newDelay);
        }
        
        // рестарт игры
        function restartGame() {
            gameRunning = true;
            player = {
                x: canvas.width/2,
                y: canvas.height/2,
                angle: 0,
                velX: 0,
                velY: 0,
                health: 100,
                invincibleTimer: 0,
                boostRemaining: 0,
                baseMaxSpeed: 520,
                currentMaxSpeed: 520,
                acceleration: 900,
                turnSpeed: 3.6,
                frictionGround: 5.0,
                reverseAcc: 500
            };
            updateMaxSpeed();
            bullets = [];
            zombies = [];
            killCounter = 0;
            shootCooldown = 0;
            zombieSpawnTimer = 0.2;
            currentSpawnDelay = 1.2;
            // ресет чекпоинтов
            initCheckpoints();
            updateUI();
            mouseX = player.x;
            mouseY = player.y;
        }
        
        // инициализация контрольных точек (золотые блоки для гонки)
        function initCheckpoints() {
            checkpoints = [];
            const points = [
                { x: 180, y: 150 },
                { x: canvas.width-180, y: 150 },
                { x: canvas.width-180, y: canvas.height-150 },
                { x: 180, y: canvas.height-150 }
            ];
            for (let i=0; i<CHECKPOINT_COUNT; i++) {
                checkpoints.push({
                    x: points[i].x,
                    y: points[i].y,
                    radius: 22,
                    active: true,
                    respawnTimer: 0,
                    id: i
                });
            }
            checkpointRespawnTimers = new Array(CHECKPOINT_COUNT).fill(0);
        }
        
        // спавн зомби с учётом позиции игрока
        function spawnZombie() {
            if (!gameRunning) return;
            // избегаем спавна прямо на игрока
            let side = Math.floor(Math.random() * 4);
            let x, y;
            const margin = 50;
            if (side === 0) { x = Math.random() * canvas.width; y = -margin; }
            else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + margin; }
            else if (side === 1) { x = canvas.width + margin; y = Math.random() * canvas.height; }
            else { x = -margin; y = Math.random() * canvas.height; }
            
            // корректировка, чтоб не телепортировало внутрь игрока
            let dx = x - player.x;
            let dy = y - player.y;
            let dist = Math.hypot(dx, dy);
            if (dist < 100) {
                x = Math.min(canvas.width+30, Math.max(-30, x + (dx>0?70:-70)));
                y = Math.min(canvas.height+30, Math.max(-30, y + (dy>0?70:-70)));
            }
            let speedBase = 125 + Math.random() * 70;
            zombies.push({
                x: x, y: y,
                radius: 20,
                speed: speedBase,
                health: 40,
                color: '#3b6e3f'
            });
        }
        
        // Обновление UI
        function updateUI() {
            const hpSpan = document.getElementById('hpValue');
            const killSpan = document.getElementById('killCount');
            const speedSpan = document.getElementById('speedValue');
            const boostSpan = document.getElementById('boostTimer');
            if (hpSpan) hpSpan.innerText = Math.floor(player.health);
            if (killSpan) killSpan.innerText = killCounter;
            let speedKmh = Math.floor(Math.hypot(player.velX, player.velY) * 0.65);
            if (speedSpan) speedSpan.innerText = Math.min(399, speedKmh);
            if (boostSpan) {
                if (player.boostRemaining > 0) boostSpan.innerText = player.boostRemaining.toFixed(1)+"с";
                else boostSpan.innerText = "—";
                if (player.boostRemaining > 0) boostSpan.style.color = "#f9a825";
                else boostSpan.style.color = "#ccccaa";
            }
        }
        
        // Обновление физики игрока (delta секунд)
        function updatePlayer(deltaSec) {
            if (!gameRunning) return;
            // управление поворотом (A/D)
            let turn = 0;
            if (turnLeft) turn = -1;
            if (turnRight) turn = 1;
            let currentSpeed = Math.hypot(player.velX, player.velY);
            let turnMultiplier = Math.min(1.2, 0.5 + (currentSpeed / player.currentMaxSpeed) * 1.2);
            let turnDelta = turn * player.turnSpeed * turnMultiplier * deltaSec;
            player.angle += turnDelta;
            
            // управление газом/тормозом
            let forward = 0;
            if (gas) forward = 1;
            if (brake) forward = -0.85;
            
            let accelForce = 0;
            if (forward > 0) {
                accelForce = player.acceleration * forward;
            } else if (forward < 0) {
                accelForce = player.reverseAcc * forward;
            }
            
            // вектор ускорения в направлении угла
            let accelX = Math.cos(player.angle) * accelForce * deltaSec;
            let accelY = Math.sin(player.angle) * accelForce * deltaSec;
            player.velX += accelX;
            player.velY += accelY;
            
            // сопротивление трению
            let friction = player.frictionGround * deltaSec;
            if (currentSpeed > 0.1) {
                player.velX *= (1 - friction);
                player.velY *= (1 - friction);
            } else {
                if (Math.abs(player.velX) < 0.2) player.velX = 0;
                if (Math.abs(player.velY) < 0.2) player.velY = 0;
            }
            
            // ограничение максимальной скорости (гоночный аспект)
            let spd = Math.hypot(player.velX, player.velY);
            let maxSp = player.currentMaxSpeed;
            if (spd > maxSp) {
                player.velX = (player.velX / spd) * maxSp;
                player.velY = (player.velY / spd) * maxSp;
            }
            
            // движение
            player.x += player.velX * deltaSec;
            player.y += player.velY * deltaSec;
            
            // границы
            player.x = Math.min(BOUNDS.xMax, Math.max(BOUNDS.xMin, player.x));
            player.y = Math.min(BOUNDS.yMax, Math.max(BOUNDS.yMin, player.y));
            if (player.x <= BOUNDS.xMin || player.x >= BOUNDS.xMax) player.velX *= -0.5;
            if (player.y <= BOUNDS.yMin || player.y >= BOUNDS.yMax) player.velY *= -0.5;
            
            // обновление буста (гоночный нитро)
            if (player.boostRemaining > 0) {
                player.boostRemaining -= deltaSec;
                if (player.boostRemaining <= 0) {
                    player.boostRemaining = 0;
                    updateMaxSpeed();
                }
            }
            updateMaxSpeed();
            
            // неуязвимость
            if (player.invincibleTimer > 0) {
                player.invincibleTimer -= deltaSec;
            }
        }
        
        // Выстрелы
        function handleShooting(deltaSec) {
            if (!gameRunning) return;
            if (shootCooldown > 0) shootCooldown -= deltaSec;
        }
        
        function shootAtMouse() {
            if (!gameRunning) return;
            if (shootCooldown > 0) return;
            let dx = mouseX - player.x;
            let dy = mouseY - player.y;
            let len = Math.hypot(dx, dy);
            if (len < 0.001) return;
            let dirX = dx / len;
            let dirY = dy / len;
            bullets.push({
                x: player.x + dirX * 22,
                y: player.y + dirY * 22,
                vx: dirX * BULLET_SPEED,
                vy: dirY * BULLET_SPEED,
                life: 2.2,
                radius: 5
            });
            shootCooldown = SHOOT_DELAY;
        }
        
        // Обновление пуль
        function updateBullets(deltaSec) {
            for (let i=0; i<bullets.length; i++) {
                let b = bullets[i];
                b.x += b.vx * deltaSec;
                b.y += b.vy * deltaSec;
                b.life -= deltaSec;
                if (b.x < -50 || b.x > canvas.width+50 || b.y < -50 || b.y > canvas.height+50 || b.life <= 0) {
                    bullets.splice(i,1);
                    i--;
                    continue;
                }
            }
        }
        
        // Зомби: ИИ преследования и коллизии
        function updateZombies(deltaSec) {
            for (let i=0; i<zombies.length; i++) {
                let z = zombies[i];
                let dx = player.x - z.x;
                let dy = player.y - z.y;
                let dist = Math.hypot(dx, dy);
                if (dist > 0.01) {
                    let move = z.speed * deltaSec;
                    let stepX = (dx / dist) * move;
                    let stepY = (dy / dist) * move;
                    z.x += stepX;
                    z.y += stepY;
                }
                // границы (не даём улететь далеко)
                z.x = Math.min(canvas.width+80, Math.max(-80, z.x));
                z.y = Math.min(canvas.height+80, Math.max(-80, z.y));
            }
            
            // Столкновение зомби с игроком (урон)
            for (let i=0; i<zombies.length; i++) {
                let z = zombies[i];
                let dxp = player.x - z.x;
                let dyp = player.y - z.y;
                let distP = Math.hypot(dxp, dyp);
                let minDist = PLAYER_SIZE/1.8 + z.radius/1.5;
                if (distP < minDist && gameRunning) {
                    damagePlayer(17);
                    let angleKnock = Math.atan2(dyp, dxp);
                    let knockForce = 320;
                    player.velX += Math.cos(angleKnock) * knockForce;
                    player.velY += Math.sin(angleKnock) * knockForce;
                    // зомби отскакивает
                    z.x += Math.cos(angleKnock) * 22;
                    z.y += Math.sin(angleKnock) * 22;
                }
            }
            
            // Столкновение пуль с зомби
            for (let i=0; i<bullets.length; i++) {
                let bullet = bullets[i];
                for (let j=0; j<zombies.length; j++) {
                    let z = zombies[j];
                    let dxb = bullet.x - z.x;
                    let dyb = bullet.y - z.y;
                    if (Math.hypot(dxb, dyb) < z.radius+4) {
                        zombies.splice(j,1);
                        bullets.splice(i,1);
                        addKill();
                        i--; break;
                    }
                }
            }
        }
        
        // Чекпоинты и бонусы (гоночный элемент)
        function updateCheckpoints(deltaSec) {
            for (let i=0; i<checkpoints.length; i++) {
                let cp = checkpoints[i];
                if (!cp.active) {
                    cp.respawnTimer -= deltaSec;
                    if (cp.respawnTimer <= 0) {
                        cp.active = true;
                    }
                    continue;
                }
                let dx = player.x - cp.x;
                let dy = player.y - cp.y;
                let dist = Math.hypot(dx, dy);
                if (dist < cp.radius + PLAYER_SIZE/2.2) {
                    cp.active = false;
                    cp.respawnTimer = 5.5; // респawn через 5.5 сек
                    // награда: ускорение + очки здоровья + очки убийств (как бонус гонки)
                    player.boostRemaining += 1.8;
                    if (player.boostRemaining > 4.5) player.boostRemaining = 4.5;
                    updateMaxSpeed();
                    player.health = Math.min(100, player.health + 12);
                    // добавим маленький счётчик убийств за прохождение контрольных точек (гоночный стайл)
                    killCounter += 2;
                    updateUI();
                    // визуальный эффект
                }
            }
        }
        
        // Спавн зомби (таймер)
        function updateSpawner(deltaSec) {
            if (!gameRunning) return;
            zombieSpawnTimer -= deltaSec;
            if (zombieSpawnTimer <= 0) {
                let spawnCount = Math.min(3, 1 + Math.floor(killCounter / 70));
                for (let i=0; i<spawnCount; i++) spawnZombie();
                let dynamicDelay = Math.max(0.6, currentSpawnDelay - (killCounter/250));
                zombieSpawnTimer = dynamicDelay;
            }
            // ограничение зомби для производительности (макс 45)
            if (zombies.length > 55) zombies = zombies.slice(0, 55);
        }
        
        // ----- ОТРИСОВКА (пиксельный майнкрафт-стиль + оптимизация) -----
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // фон - травяной блок
            ctx.fillStyle = "#5b8c4e";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            for (let i=0; i<canvas.width+32; i+=48) {
                ctx.fillStyle = "#7caf5a";
                ctx.fillRect(i,0,24,canvas.height);
                ctx.fillStyle = "#6a9e48";
                ctx.fillRect(i+24,0,24,canvas.height);
            }
            // Сетка как в майнкрафте
            ctx.strokeStyle = "#3d5a2b";
            ctx.lineWidth = 1;
            for (let i=0; i<canvas.width; i+=50){
                ctx.beginPath();
                ctx.moveTo(i,0);
                ctx.lineTo(i,canvas.height);
                ctx.stroke();
                ctx.moveTo(0,i);
                ctx.lineTo(canvas.width,i);
                ctx.stroke();
            }
            
            // контрольные точки (золотые блоки с анимацией)
            for (let cp of checkpoints) {
                if (!cp.active) {
                    ctx.fillStyle = "#6b4c2e88";
                    ctx.beginPath();
                    ctx.arc(cp.x, cp.y, cp.radius-4, 0, Math.PI*2);
                    ctx.fill();
                    continue;
                }
                ctx.shadowBlur = 8;
                ctx.fillStyle = "#f6c358";
                ctx.beginPath();
                ctx.rect(cp.x-14, cp.y-14, 28,28);
                ctx.fill();
                ctx.fillStyle = "#d4a017";
                ctx.beginPath();
                ctx.rect(cp.x-8, cp.y-8, 16,16);
                ctx.fill();
                ctx.fillStyle = "#ffdf80";
                ctx.font = "bold 20 monospace";
                ctx.fillText("⭐", cp.x-9, cp.y+8);
                ctx.shadowBlur = 0;
            }
            
            // зомби
            for (let z of zombies) {
                ctx.fillStyle = "#3c8c40";
                ctx.shadowBlur = 2;
                ctx.fillRect(z.x-16, z.y-16, 32,32);
                ctx.fillStyle = "#2b5e2b";
                ctx.fillRect(z.x-12, z.y-10, 24,8);
                ctx.fillStyle = "#000000";
                ctx.fillRect(z.x-8, z.y-6, 6,6);
                ctx.fillRect(z.x+2, z.y-6, 6,6);
                ctx.fillStyle = "#3a2a1f";
                ctx.fillRect(z.x-4, z.y+2, 8,5);
                ctx.fillStyle = "#8b5a2b";
                ctx.fillRect(z.x-10, z.y+6, 20,6);
            }
            
            // пули
            for (let b of bullets) {
                ctx.fillStyle = "#ffcc44";
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#ff9900";
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2.5,0,Math.PI*2);
                ctx.fill();
            }
            
            // игрок (гоночная машина/стиль майнкарт)
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            ctx.fillStyle = "#3c6a9e";
            ctx.shadowBlur = 4;
            ctx.fillRect(-15, -12, 30, 24);
            ctx.fillStyle = "#2c4a6e";
            ctx.fillRect(-8, -18, 16, 10);
            ctx.fillStyle = "#c99e3f";
            ctx.fillRect(-4, -6, 8, 10);
            ctx.fillStyle = "#eee5c4";
            ctx.fillRect(-12, -4, 6, 6);
            ctx.fillRect(6, -4, 6, 6);
            ctx.fillStyle = "#c04120";
            ctx.fillRect(-14, 0, 28, 6);
            ctx.fillStyle = "#adadad";
            ctx.fillRect(-18, -8, 6, 12);
            ctx.fillRect(12, -8, 6, 12);
            ctx.restore();
            
            // отображение прицела
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 8, 0, Math.PI*2);
            ctx.strokeStyle = "white";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(mouseX-14, mouseY);
            ctx.lineTo(mouseX-6, mouseY);
            ctx.moveTo(mouseX+6, mouseY);
            ctx.lineTo(mouseX+14, mouseY);
            ctx.moveTo(mouseX, mouseY-14);
            ctx.lineTo(mouseX, mouseY-6);
            ctx.moveTo(mouseX, mouseY+6);
            ctx.lineTo(mouseX, mouseY+14);
            ctx.stroke();
            
            if (!gameRunning) {
                ctx.font = "bold 34px 'Courier New'";
                ctx.fillStyle = "#ff3a2f";
                ctx.shadowBlur = 0;
                ctx.fillText("💀 GAME OVER 💀", canvas.width/2-180, canvas.height/2-40);
                ctx.font = "20px monospace";
                ctx.fillStyle = "#efd780";
                ctx.fillText("Нажми R или кнопку РЕСТАРТ", canvas.width/2-170, canvas.height/2+40);
            }
            ctx.shadowBlur = 0;
        }
        
        // ---- Главный цикл с delta time и оптимизацией ----
        let lastFrameTime = 0;
        function gameLoop(nowMs) {
            if (!lastFrameTime) lastFrameTime = nowMs;
            let delta = Math.min(0.033, (nowMs - lastFrameTime) / 1000);
            if (delta <= 0) { lastFrameTime = nowMs; requestAnimationFrame(gameLoop); return; }
            lastFrameTime = nowMs;
            
            if (gameRunning) {
                updatePlayer(delta);
                handleShooting(delta);
                updateBullets(delta);
                updateZombies(delta);
                updateCheckpoints(delta);
                updateSpawner(delta);
                updateUI();
            }
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // ---- События ввода для ПК оптимизация ----
        function handleKeyDown(e) {
            let code = e.code;
            if (keys.hasOwnProperty(code)) keys[code] = true;
            if (code === 'KeyW' || code === 'ArrowUp') gas = true;
            if (code === 'KeyS' || code === 'ArrowDown') brake = true;
            if (code === 'KeyA' || code === 'ArrowLeft') turnLeft = true;
            if (code === 'KeyD' || code === 'ArrowRight') turnRight = true;
            if (code === 'KeyR') { restartGame(); e.preventDefault(); }
            if (code === 'Space') { e.preventDefault(); }
        }
        
        function handleKeyUp(e) {
            let code = e.code;
            if (keys.hasOwnProperty(code)) keys[code] = false;
            if (code === 'KeyW' || code === 'ArrowUp') gas = false;
            if (code === 'KeyS' || code === 'ArrowDown') brake = false;
            if (code === 'KeyA' || code === 'ArrowLeft') turnLeft = false;
            if (code === 'KeyD' || code === 'ArrowRight') turnRight = false;
        }
        
        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let canvasX = (e.clientX - rect.left) * scaleX;
            let canvasY = (e.clientY - rect.top) * scaleY;
            mouseX = Math.min(canvas.width, Math.max(0, canvasX));
            mouseY = Math.min(canvas.height, Math.max(0, canvasY));
        }
        
        function handleShootEvent(e) {
            e.preventDefault();
            shootAtMouse();
        }
        
        window.addEventListener('load', () => {
            initCheckpoints();
            restartGame();
            for(let i=0;i<3;i++) spawnZombie();
            zombieSpawnTimer = 0.6;
            updateUI();
            animationId = requestAnimationFrame(gameLoop);
        });
        
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('mousedown', handleShootEvent);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        document.getElementById('restartBtn').addEventListener('click', () => restartGame());
    })();
</script>
</body>
</html>
